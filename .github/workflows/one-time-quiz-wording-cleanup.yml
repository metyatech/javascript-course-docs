1問目は2番目、2問目は1番目、3問目は3番目が正解なので、`answerIndex` は順に `1`、`0`、`2` です。""",
               """1問分は、次の形で作ります。

```js
{
    text: '日本で一番高い山は？',
    choices: ['高尾山', '富士山', '筑波山', '阿蘇山'],
    answerIndex: 1
