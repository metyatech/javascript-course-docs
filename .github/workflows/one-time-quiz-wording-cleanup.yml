      - name: Commit changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add content/docs/apps/quiz-app-4choice/index.mdx
          git diff --cached --check
          git commit -m "docs: streamline four-choice quiz wording"
          git push
