```

この形で、同じテーマの問題を3問以上作ります。"""),
              ('<Section title="今回作った仕組み" goal="問題データ、状態、画面の更新がどのようにつながっているかを整理します。">',
               '<Section title="クイズアプリの仕組みを整理する" goal="問題データ、状態、画面の更新のつながりを確認します。">'),
              ("""6. 再スタート時は `currentIndex` と `score` を `0` へ戻す

問題の内容は `questions`、今の進み具合は `currentIndex`、`score`、`answered` が覚えています。  
画面に表示する内容は、それらの値に合わせて関数が更新しています。""",
               """6. 再スタート時は `currentIndex` と `score` を `0` へ戻す"""),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'missing replacement target:\n{old[:120]}')
              text = text.replace(old, new, 1)

          text = text.replace("        messageText.className = 'correct';\n", '')
          text = text.replace("        messageText.className = 'wrong';\n", '')
          text = text.replace("    messageText.className = '';\n", '')
          text = text.replace("        messageText.className = 'correct';\n", '')
          text = text.replace("        messageText.className = 'wrong';\n", '')
          text = text.replace("messageText.className = '';\n", '')

          path.write_text(text, encoding='utf-8')
