name: One-time quiz wording cleanup

on:
  push:
    paths:
      - .github/workflows/one-time-quiz-wording-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Streamline quiz lesson wording
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('content/docs/apps/quiz-app-4choice/index.mdx')
          text = path.read_text(encoding='utf-8')

          replacements = [
              ("""このページでは、完成コードを一度に書くのではなく、次の順番でJavaScriptを組み立てます。

1. 完成形の動きを確認する
2. HTMLとCSSを用意する
3. 問題データと、クイズの進み具合を表す変数を用意する
4. 現在の問題を表示する
5. 選ばれた答えを判定する
6. 回答後のボタンと色を変更する
7. 次の問題、結果画面、再スタートを作る
8. 自分のテーマのクイズに改造する

演習1〜8が基本課題です。`演習-発展` は、基本課題を完成させた人だけ取り組みます。""",
               """完成形を確認したあと、JavaScriptを少しずつ追加してクイズアプリを作ります。

演習1〜8が基本です。発展演習は、時間に余裕があれば取り組みます。"""),
              ('<Section title="今日のミッション" goal="複数の問題を順番に表示し、回答と得点を管理するクイズアプリを完成させます。">\n\n完成すると、4つの選択肢から1つを選び、全問が終わったあとに正解数を確認できます。  \n結果画面の「もう一度」ボタンを押すと、最初からやり直せます。',
               '<Section title="完成形を確認する" goal="回答前・回答後・全問終了後の画面を確認します。">\n\nまずは完成形を動かし、クイズがどのように進むか確認します。'),
              ("""### 演習1

<Exercise>

完成形を、次の順番で動かしてください。

1. まだ回答せずに「次の問題へ」を押す
2. 1回目は3問すべて正解し、「3問中3問正解」と表示されるまで進める
3. 各問題で、回答後に正解の選択肢が緑色になり、ほかの選択肢を押せないことを確認する
4. 「もう一度」を押し、1問目へ戻ることを確認する
5. 2回目は1問目で不正解を選び、選んだ選択肢が赤色、正解が緑色になることを確認する
6. 2回目は3問すべて不正解にし、「3問中0問正解」と表示されるまで進める

6つの動きをすべて確認できれば成功です。

<Hint>

1回目と2回目で異なる答えを選ぶと、正解時、不正解時、得点のリセットを順番に確認できます。

</Hint>

<Answer>

このアプリには、次の3つの場面があります。

