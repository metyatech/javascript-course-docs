| 回答後 | 正誤と正解が表示され、選択肢を押せなくなる |
| 全問終了後 | 正解数と「もう一度」ボタンが表示される |

「もう一度」を押すと、問題番号と得点が最初の値へ戻ります。  
これから、この3つの場面を順番に作ります。

</Answer>

</Exercise>""",
               """### 演習1

<Verify title="完成形の動きを確認する">

完成形を、次の順番で操作してください。

1. 回答前に「次の問題へ」を押し、問題が進まないことを確認する
2. 1回目は全問正解し、正解の選択肢が緑色になることと、回答後に選択肢を押せないことを確認する
3. 結果が「3問中3問正解」になることを確認する
4. 「もう一度」を押し、1問目・0点から再開することを確認する
5. 2回目は全問不正解にし、選んだ選択肢が赤色、正解が緑色になり、結果が「3問中0問正解」になることを確認する

すべて確認できれば成功です。

</Verify>"""),
              ("""このページではJavaScriptの処理に集中するため、HTMLとCSSはそのままコピーして使います。

HTMLでは、JavaScriptから取得する要素に `id` を付けます。

CSSでは、4つの選択肢ボタンを `display: block` で縦に並べます。  
「もう一度」ボタンは、最初は `display: none` で非表示にします。

`button:disabled` は、`disabled = true` で押せない状態になったボタンだけを指定する疑似クラスです。  
このアプリでは、回答後のボタンを少し薄く表示するために使います。""",
               """HTMLとCSSはコピーして使います。JavaScriptは空の状態から作ります。"""),
              ("""4つのボタンへ選択肢を入れるときは、同じ `i` を2つの配列に使います。

| `i` | 書き換えるボタン | 入れる選択肢 |
| ---: | --- | --- |
| `0` | `choiceButtons[0]` | `question.choices[0]` |
| `1` | `choiceButtons[1]` | `question.choices[1]` |
| `2` | `choiceButtons[2]` | `question.choices[2]` |
| `3` | `choiceButtons[3]` | `question.choices[3]` |

この段階では、問題番号、問題文、選択肢の表示だけを作ります。  
回答後の色やボタンの状態を戻す処理は、必要になった段階で追加します。""",
               """同じ `i` を使うと、`i` 番目のボタンへ `i` 番目の選択肢を表示できます。

この段階では、問題番号、問題文、選択肢だけを表示します。"""),
              ("""`checkAnswer` 関数には、押された選択肢の位置を `selectedIndex` として渡します。

- 1番目のボタンなら `0`
- 2番目のボタンなら `1`
- 3番目のボタンなら `2`
- 4番目のボタンなら `3`

現在の問題が持っている `answerIndex` と `selectedIndex` が同じなら正解です。

最初に、次の4つを作ります。

1. 回答したことを `answered` に覚える
2. 正解か不正解かを判定する
3. 正解なら `score` を1増やす
4. 判定結果を文字で表示する

色の変更と、回答後にボタンを押せなくする処理は、次のセクションで追加します。""",
               """`checkAnswer` 関数には、押された選択肢のインデックスを `selectedIndex` として渡します。  
`selectedIndex` と正解の `answerIndex` を比べ、まずは得点とメッセージを更新します。"""),
              ("""回答したあとも選択肢を押せるままだと、同じ問題で `score` を何度も増やせます。  
そこで、回答時に4つのボタンすべての `disabled` を `true` にします。

正解の位置は `question.answerIndex`、学習者が選んだ位置は `selectedIndex` です。

- 正解のボタンには `correct` クラスを付ける
- 不正解の場合は、選んだボタンに `wrong` クラスを付ける
- 結果メッセージにも `correct` または `wrong` クラスを付ける""",
               """回答後も選択肢を押せると、同じ問題で `score` を何度も増やせます。  
4つのボタンの `disabled` を `true` にして、回答後は押せないようにします。

CSSの `button:disabled` は、押せないボタンを少し薄く表示します。  
正解のボタンには `correct`、不正解で選んだボタンには `wrong` クラスを付けます。"""),
              ("""1. `answered = true;` の下で、4つのボタンを `for` 文で押せない状態にする
2. `if` 文の前で、正解のボタンに `correct` クラスを付ける
3. 正解の場合は、結果メッセージに `correct` クラスを付ける
4. 不正解の場合は、選んだボタンと結果メッセージに `wrong` クラスを付ける""",
               """1. `answered = true;` の下で、4つのボタンを `for` 文で押せない状態にする
2. `if` 文の前で、正解のボタンに `correct` クラスを付ける
3. 不正解の場合は、選んだボタンに `wrong` クラスを付ける"""),
              ('ボタンやメッセージへクラスを付けるときは、`className` にクラス名を入れます。',
               'ボタンへクラスを付けるときは、`className` にクラス名を入れます。'),
              ('<Section title="次の問題へ進む" goal="回答後に問題番号を進め、次の問題を表示します。">',
               '<Section title="次の問題または結果を表示する" goal="回答後に、次の問題または結果画面を表示します。">'),
              ('- ボタンとメッセージのクラスを消す', '- ボタンのクラスを消す'),
              ("""messageText.textContent = '選択肢を選んでください。';
messageText.className = '';
answered = false;""",
               """messageText.textContent = '選択肢を選んでください。';
answered = false;"""),
              ("""- 増やした値が `questions.length` より小さい場合は、まだ表示する問題がある
- 増やした値が `questions.length` と同じになった場合は、配列の外まで進んでいる""",
               """- `currentIndex` が `questions.length` より小さければ、次の問題がある
- 同じ値になったら、表示できる次の問題はない"""),
              ("""このとき、次のどちらの条件を使えば「まだ次の問題がある」と正しく判定できますか。

```js
currentIndex < questions.length
```

```js
currentIndex <= questions.length
```

正しい条件と、その理由を説明できれば成功です。""",
               """「まだ次の問題がある」と判定するには、`currentIndex < questions.length` と `currentIndex <= questions.length` のどちらを使いますか。理由も答えてください。"""),
              ("""正しい条件は、次のコードです。

```js
currentIndex < questions.length
```

3問の配列で使える最後のインデックスは `2` です。  
`currentIndex` が `3` になった時点で次の問題はないため、`<=` ではなく `<` を使います。""",
               """`currentIndex < questions.length` を使います。3問の配列で使えるインデックスは `0`〜`2` なので、`currentIndex` が `3` なら次の問題はありません。"""),
              ("""次の箇所を確認してください。

1. 回答時に `answered = true` へ変えているか
2. `currentIndex++;` が、次の問題の有無を判定する前にあるか
3. 条件が `currentIndex < questions.length` になっているか
4. `showQuestion();` と `showFinalResult();` に括弧が付いているか
5. `showQuestion` の中で `answered = false` へ戻しているか
6. `showFinalResult` の中で、選択肢と2つのボタンの表示を切り替えているか""",
               """次の箇所を確認してください。

1. 回答時に `answered = true` へ変えているか
2. `currentIndex++;` が判定より前にあるか
3. 条件が `currentIndex < questions.length` になっているか"""),
              ("""次の箇所を確認してください。

1. `showFinalResult();` が `else` の中にあるか
2. `showFinalResult` の中で2つのボタンの表示を切り替えているか
3. 再スタート時に `currentIndex` と `score` を両方 `0` へ戻しているか
4. `showQuestion` の中で選択肢と2つのボタンの表示を戻しているか
5. `showQuestion();` と `showFinalResult();` に括弧が付いているか""",
               """次の箇所を確認してください。

1. `currentIndex` と `score` を両方 `0` に戻しているか
2. `showQuestion();` を呼び出しているか
3. `showQuestion` の中で選択肢とボタンの表示を戻しているか"""),
              ("""<Checkpoint title="完成確認">

次の条件をすべて満たしていれば完成です。

- 自分で決めたテーマの問題が3問以上ある
- 各問題に4つの選択肢がある
- 問題文と正解が事実として正しい
- `answerIndex` と正解の位置が一致している
- 回答前は次の問題へ進めない
- 正解と不正解が正しく判定される
- 最後に正解数が表示される
- 「もう一度」で1問目・0点から再開できる

</Checkpoint>""",
               """<Checkpoint title="自作クイズの確認">

次の条件を確認してください。

- 自分で決めたテーマの問題が3問以上ある
- 各問題に4つの選択肢がある
- 問題文と正解が事実として正しい
- `answerIndex` と正解の位置が一致している

</Checkpoint>"""),
              ("""例として、JavaScriptの復習クイズを作る場合は次のようにできます。

```js
let questions = [
    {
