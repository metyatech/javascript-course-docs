name: Deploy site to Vercel (content update)

on:
  push:
    branches:
      - master
    paths:
      - 'content/**'
      - 'public/**'
      - 'site.config.ts'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_AUTH_JSON: ${{ secrets.VERCEL_AUTH_JSON }}
      VERCEL_CLI_VERSION: 50.9.6
      VERCEL_GLOBAL_CONFIG_DIR: /tmp/vercel-global-config
      COURSE_CONTENT_SOURCE: '../course-content'
    steps:
      - name: Validate secrets
        run: |
          if [ -z "$VERCEL_AUTH_JSON" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more required secrets: VERCEL_AUTH_JSON, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Checkout course content
        uses: actions/checkout@v6
        with:
          path: course-content

      - name: Checkout course-docs-site
        uses: actions/checkout@v6
        with:
          repository: metyatech/course-docs-site
          ref: main
          path: site

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Configure Vercel auth
        run: |
          mkdir -p "$VERCEL_GLOBAL_CONFIG_DIR"
          printf '%s' "$VERCEL_AUTH_JSON" > "$VERCEL_GLOBAL_CONFIG_DIR/auth.json"

      - name: Vercel auth preflight
        run: |
          npx vercel@${{ env.VERCEL_CLI_VERSION }} whoami --global-config "$VERCEL_GLOBAL_CONFIG_DIR"
          node --input-type=module <<'EOF'
          import fs from 'node:fs';

          const configDir = process.env.VERCEL_GLOBAL_CONFIG_DIR;
          const authConfig = JSON.parse(
            fs.readFileSync(`${configDir}/auth.json`, 'utf8'),
          );
          const projectId = process.env.VERCEL_PROJECT_ID;
          const teamId = process.env.VERCEL_ORG_ID;

          if (!authConfig.token) {
            throw new Error('Vercel auth.json does not contain a token.');
          }

          async function check(url, label) {
            const response = await fetch(url, {
              headers: {
                Authorization: `Bearer ${authConfig.token}`,
              },
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`${label} failed (${response.status}): ${body}`);
            }

            return response.json();
          }

          const user = await check('https://api.vercel.com/www/user', 'user lookup');
          const project = await check(
            `https://api.vercel.com/v9/projects/${projectId}?teamId=${teamId}`,
            'project lookup',
          );

          if (project.id !== projectId) {
            throw new Error(`Resolved unexpected project id: ${project.id}`);
          }

          console.log(
            `Authenticated as ${user.user.username}; verified access to ${project.name} (${project.id}).`,
          );
          EOF

      - name: Install
        working-directory: site
        run: npm ci

      - name: Lint
        working-directory: site
        run: npm run lint

      - name: Vercel pull
        working-directory: site
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} pull --yes --environment=production --global-config "$VERCEL_GLOBAL_CONFIG_DIR"

      - name: Vercel build
        working-directory: site
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} build --prod --global-config "$VERCEL_GLOBAL_CONFIG_DIR"

      - name: Vercel deploy (retry once)
        working-directory: site
        run: |
          npx vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prebuilt --prod --archive=tgz --global-config "$VERCEL_GLOBAL_CONFIG_DIR" || \
          npx vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prebuilt --prod --archive=tgz --global-config "$VERCEL_GLOBAL_CONFIG_DIR"
