name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: davidans/github-action-markdownlint@v1
        with:
          config: .markdownlint.json
          glob: "**/*.md"
          ignore: "AGENTS.md"
